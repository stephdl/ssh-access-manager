name: CI

on:
  pull_request:

jobs:
  tests-python:
    name: Tests Python
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        run: |
          pip install \
            flask click paramiko psycopg2-binary pyyaml \
            pytest pytest-cov pytest-mock freezegun werkzeug

      - name: Run pytest
        run: python3 -m pytest tests/ --cov=actions --cov-fail-under=80 -v
        working-directory: app

  tests-vue:
    name: Tests Vue.js
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: ui/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: ui

      - name: Run vitest
        run: npx vitest run
        working-directory: ui
