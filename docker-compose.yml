services:
  sam-server:
    build: .
    container_name: sam-server
    restart: unless-stopped
    ports:
      - "${NGINX_PORT:-8080}:${NGINX_PORT:-8080}"
    volumes:
      - ssh_data:/data
      # Optional TLS certs bind mount (paths must match NGINX_TLS_* values)
      # - ./certs:/data/certs:ro
    env_file:
      - .env

volumes:
  ssh_data:
    driver: local
